<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>משימות משפחה 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <div id="screen-home" class="screen active">
      <div class="home-header">
        <h1>המשפחה שלנו 🌿</h1>
        <span class="sync-dot" title="מתעדכן אוטומטית"></span>
      </div>
      <div class="home-grid" id="user-grid"></div>
    </div>

    <div id="screen-member" class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="goHome()">
          <i class="ti ti-arrow-right"></i> חזרה
        </button>
        <h2 id="member-title"></h2>
        <span class="sync-dot"></span>
      </div>
      <div id="member-tasks"></div>
      <div id="member-empty" class="empty-state" style="display:none">אין משימות פתוחות 🎉</div>
    </div>

    <div id="screen-admin" class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="goHome()">
          <i class="ti ti-arrow-right"></i> חזרה
        </button>
        <h2>ניהול משפחה ⭐</h2>
        <span class="sync-dot"></span>
      </div>
      <div id="admin-content"></div>
    </div>

  </div>

  <!-- Emoji Modal -->
  <div id="emoji-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;padding:1rem;" onclick="if(event.target===this)closeEmojiPicker()">
    <div style="background:#f0ede4;border-radius:24px;padding:1.25rem;width:100%;max-width:300px;border:3px solid #e0d8c0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <span id="emoji-modal-title" style="font-family:'Fredoka One',cursive;font-size:17px;color:#3a3a1a;"></span>
        <button onclick="closeEmojiPicker()" style="background:none;border:none;cursor:pointer;font-size:22px;color:#8a8a6a;padding:0;line-height:1;">✕</button>
      </div>
      <div id="emoji-modal-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"></div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <!-- Firebase compat SDK — loads fast, no module bundling needed -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
