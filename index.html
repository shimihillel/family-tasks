<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>משימות משפחה 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <div id="screen-home" class="screen active">
      <div class="home-header">
        <h1>המשפחה שלנו 🌿</h1>
        <span class="sync-dot" title="מתעדכן אוטומטית"></span>
      </div>
      <div class="home-grid" id="user-grid"></div>
    </div>

    <div id="screen-member" class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="goHome()">
          <i class="ti ti-arrow-right"></i> חזרה
        </button>
        <h2 id="member-title"></h2>
        <span class="sync-dot"></span>
      </div>
      <div id="member-tasks"></div>
      <div id="member-empty" class="empty-state" style="display:none">אין משימות פתוחות 🎉</div>
    </div>

    <div id="screen-admin" class="screen">
      <div class="app-header">
        <button class="back-btn" onclick="goHome()">
          <i class="ti ti-arrow-right"></i> חזרה
        </button>
        <h2>ניהול משפחה ⭐</h2>
        <span class="sync-dot"></span>
      </div>
      <div id="admin-content"></div>
    </div>

  </div>

  <canvas id="confetti-canvas"></canvas>
  <script type="module" src="app.js"></script>
</body>
</html>
